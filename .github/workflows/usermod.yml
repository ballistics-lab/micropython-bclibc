name: usermod

on:
  pull_request:
    paths:
      - "bclibc"
      - "usermod/**"
      - ".github/workflows/usermod.yml"
  workflow_dispatch:
    inputs:
      mpy_tag:
        description: "MicroPython release tag (e.g. v1.28.0)"
        required: false
        default: "v1.28.0"

env:
  MPY_TAG: ${{ github.event.inputs.mpy_tag || 'v1.28.0' }}

jobs:
  # ── ARMhf: cross-compile (static) + test under qemu-arm ──────────────────
  build-test-armhf:
    name: build + test (armhf / qemu-arm)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Fetch MicroPython ${{ env.MPY_TAG }}
        run: |
          VER="${MPY_TAG#v}"
          wget -q "https://github.com/micropython/micropython/releases/download/${MPY_TAG}/micropython-${VER}.tar.xz" -O mpy.tar.xz
          tar xf mpy.tar.xz && rm mpy.tar.xz
          echo "MPY_DIR=$GITHUB_WORKSPACE/micropython-${VER}" >> $GITHUB_ENV

      - name: Install cross-compiler + build tools + QEMU
        run: |
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            autoconf automake libtool libtool-bin pkg-config \
            qemu-user

      - name: Build mpy-cross (for FROZEN_MANIFEST)
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Build standalone libffi for armhf
        run: |
          USERMOD_BUILD="$GITHUB_WORKSPACE/usermod/build"
          make -C "$MPY_DIR/ports/unix" VARIANT=standard \
            BUILD="$USERMOD_BUILD/armhf_dp" \
            CROSS_COMPILE=arm-linux-gnueabihf- \
            MICROPY_STANDALONE=1 \
            LDFLAGS_EXTRA="-static" \
            deplibs

      - name: Build armhf usermod (double precision, static)
        working-directory: usermod
        run: make armhf MPY_DIR="$MPY_DIR"

      - name: Run tests
        run: |
          qemu-arm usermod/build/armhf_dp/micropython \
            tests/test_bclibc.py

      - uses: actions/upload-artifact@v7
        with:
          name: tiny-bclibc-usermod-armhf
          path: usermod/build/armhf_dp/micropython
          if-no-files-found: error

  # ── MIPS LE: build inside Docker (Ubuntu 22.04) + test under qemu-mipsel ────
  # mpy-cross, submodules, deplibs, and the main build all happen inside the
  # container; output lands on the host via volume mount.
  # git clone is used (not tarball) so Docker's `make submodules` has a real
  # git repo and can run `git submodule update --init`.
  build-test-mipsel:
    name: build + test (mipsel / qemu-mipsel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Clone MicroPython ${{ env.MPY_TAG }}
        run: |
          git clone --depth=1 --branch "${MPY_TAG}" \
            https://github.com/micropython/micropython.git
          cd micropython
          git submodule update --init \
            lib/libffi lib/mbedtls lib/micropython-lib lib/berkeley-db-1.xx
          echo "MPY_DIR=$GITHUB_WORKSPACE/micropython" >> $GITHUB_ENV

      - name: Install QEMU user-mode emulation
        run: sudo apt-get install -y qemu-user

      - name: Build mipsel usermod (Docker, Ubuntu 22.04)
        working-directory: usermod
        run: make mipsel MPY_DIR="$MPY_DIR"

      - name: Run tests
        run: |
          qemu-mipsel usermod/build/mipsel_dp/micropython \
            tests/test_bclibc.py

      - uses: actions/upload-artifact@v7
        with:
          name: tiny-bclibc-usermod-mipsel
          path: usermod/build/mipsel_dp/micropython
          if-no-files-found: error

  # ── AArch64: native ubuntu-26.04-arm runner — build + test + artifact ───
  build-test-aarch64:
    name: build + test (aarch64)
    runs-on: ubuntu-26.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Fetch MicroPython ${{ env.MPY_TAG }}
        run: |
          VER="${MPY_TAG#v}"
          wget -q "https://github.com/micropython/micropython/releases/download/${MPY_TAG}/micropython-${VER}.tar.xz" -O mpy.tar.xz
          tar xf mpy.tar.xz && rm mpy.tar.xz
          echo "MPY_DIR=$GITHUB_WORKSPACE/micropython-${VER}" >> $GITHUB_ENV

      - name: Install build deps
        run: sudo apt-get install -y libffi-dev pkg-config

      - name: Build mpy-cross
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Build usermod (native aarch64, double precision)
        working-directory: usermod
        run: make x64 MPY_DIR="$MPY_DIR"

      - name: Run tests
        run: |
          usermod/build/x64_dp/micropython \
            tests/test_bclibc.py

      - uses: actions/upload-artifact@v7
        with:
          name: tiny-bclibc-usermod-aarch64
          path: usermod/build/x64_dp/micropython
          if-no-files-found: error

  # ── armv7m_sp: QEMU Cortex-M3 firmware with usermod baked in ─────────────
  #
  # Builds ports/qemu BOARD=MPS2_AN385 with USER_C_MODULES + FROZEN_MANIFEST
  # so that both _tiny_bclibc (C module) and tiny_bclibc.py (Python wrapper)
  # are embedded in the firmware.  Tests run via usermod/ci/run_qemu.py which
  # uses pyboard to execute test_bclibc.py over the QEMU UART — no .mpy files
  # needed (unlike the natmod variant).
  build-test-qemu-armv7m:
    name: build + test (armv7m_sp / QEMU Cortex-M3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Fetch MicroPython ${{ env.MPY_TAG }}
        run: |
          VER="${MPY_TAG#v}"
          wget -q "https://github.com/micropython/micropython/releases/download/${MPY_TAG}/micropython-${VER}.tar.xz" -O mpy.tar.xz
          tar xf mpy.tar.xz && rm mpy.tar.xz
          echo "MPY_DIR=$GITHUB_WORKSPACE/micropython-${VER}" >> $GITHUB_ENV

      - name: Install toolchain + QEMU
        run: |
          sudo apt-get install -y \
            gcc-arm-none-eabi libnewlib-arm-none-eabi \
            qemu-system-arm
          pip install pyserial

      - name: Build mpy-cross
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Generate version header
        working-directory: usermod
        run: make generated MPY_DIR="$MPY_DIR"

      - name: Build QEMU firmware (MPS2_AN385 / Cortex-M3) with usermod
        run: |
          make -C "$MPY_DIR/ports/qemu" BOARD=MPS2_AN385 \
            USER_C_MODULES="$GITHUB_WORKSPACE" \
            FROZEN_MANIFEST="$GITHUB_WORKSPACE/usermod/manifest.py" \
            TINY_BCLIBC_PRECISION=single

      - name: Run tests via QEMU
        env:
          MPY_DIR: ${{ env.MPY_DIR }}
        run: |
          python3 usermod/ci/run_qemu.py \
            "$MPY_DIR/ports/qemu/build-MPS2_AN385/firmware.elf" \
            tests/

  # ── x64: native builds, test, artifact ───────────────────────────────────
  build-test-x64:
    name: build + test (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Fetch MicroPython ${{ env.MPY_TAG }}
        run: |
          VER="${MPY_TAG#v}"
          wget -q "https://github.com/micropython/micropython/releases/download/${MPY_TAG}/micropython-${VER}.tar.xz" -O mpy.tar.xz
          tar xf mpy.tar.xz && rm mpy.tar.xz
          echo "MPY_DIR=$GITHUB_WORKSPACE/micropython-${VER}" >> $GITHUB_ENV

      - name: Install deps
        run: sudo apt-get install -y libffi-dev

      - name: Build mpy-cross
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Build x64 dp + sp
        working-directory: usermod
        run: |
          make x64   MPY_DIR="$MPY_DIR"
          make x64sp MPY_DIR="$MPY_DIR"

      - name: Test x64 dp + sp
        run: |
          usermod/build/x64_dp/micropython tests/test_bclibc.py
          usermod/build/x64_sp/micropython tests/test_bclibc.py

      - uses: actions/upload-artifact@v7
        with:
          name: tiny-bclibc-usermod-x64
          path: |
            usermod/build/x64_dp/micropython
            usermod/build/x64_sp/micropython
          if-no-files-found: error

  # ── x86: 32-bit standalone builds, test, artifact ────────────────────────
  build-test-x86:
    name: build + test (x86)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Fetch MicroPython ${{ env.MPY_TAG }}
        run: |
          VER="${MPY_TAG#v}"
          wget -q "https://github.com/micropython/micropython/releases/download/${MPY_TAG}/micropython-${VER}.tar.xz" -O mpy.tar.xz
          tar xf mpy.tar.xz && rm mpy.tar.xz
          echo "MPY_DIR=$GITHUB_WORKSPACE/micropython-${VER}" >> $GITHUB_ENV

      - name: Install deps
        run: |
          sudo apt-get install -y \
            gcc-multilib g++-multilib \
            texinfo autoconf automake libtool

      - name: Build mpy-cross
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Build standalone libffi for x86
        run: |
          B="$GITHUB_WORKSPACE/usermod/build"
          make -C "$MPY_DIR/ports/unix" VARIANT=standard \
            BUILD="$B/x86_dp" \
            MICROPY_FORCE_32BIT=1 MICROPY_STANDALONE=1 LDFLAGS_EXTRA="-static" \
            deplibs
          make -C "$MPY_DIR/ports/unix" VARIANT=standard \
            BUILD="$B/x86_sp" \
            MICROPY_FORCE_32BIT=1 MICROPY_STANDALONE=1 LDFLAGS_EXTRA="-static" \
            deplibs

      - name: Build x86 dp + sp
        working-directory: usermod
        run: |
          make x86   MPY_DIR="$MPY_DIR"
          make x86sp MPY_DIR="$MPY_DIR"

      - name: Test x86 dp + sp
        run: |
          usermod/build/x86_dp/micropython tests/test_bclibc.py
          usermod/build/x86_sp/micropython tests/test_bclibc.py

      - uses: actions/upload-artifact@v7
        with:
          name: tiny-bclibc-usermod-x86
          path: |
            usermod/build/x86_dp/micropython
            usermod/build/x86_sp/micropython
          if-no-files-found: error

  # ── RP2040: build firmware (sp + dp), upload UF2 artifacts ──────────────
  build-rp2040:
    name: build + artifact (rp2040)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Clone MicroPython ${{ env.MPY_TAG }}
        run: |
          git clone --depth=1 --branch "${MPY_TAG}" \
            https://github.com/micropython/micropython.git
          cd micropython
          git submodule update --init \
            lib/pico-sdk lib/micropython-lib lib/tinyusb
          git -C lib/pico-sdk submodule update --init
          echo "MPY_DIR=$GITHUB_WORKSPACE/micropython" >> $GITHUB_ENV

      - name: Install toolchain
        run: |
          sudo apt-get install -y \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3

      - name: Build mpy-cross
        run: make -C "$MPY_DIR/mpy-cross"

      - name: Build RP2040 sp + dp
        working-directory: usermod
        run: |
          make rp2040   MPY_DIR="$MPY_DIR"
          make rp2040dp MPY_DIR="$MPY_DIR"

      - uses: actions/upload-artifact@v7
        with:
          name: tiny-bclibc-usermod-rp2040
          path: |
            usermod/build/rp2040_sp/firmware.uf2
            usermod/build/rp2040_dp/firmware.uf2
          if-no-files-found: error
