name: Clone MicroPython
description: >
  Shallow-clones a MicroPython release branch, initialises the requested
  submodules, and exports MPY_DIR into $GITHUB_ENV.

inputs:
  mpy_tag:
    description: MicroPython release tag (e.g. v1.28.0)
    required: true
  submodules:
    description: Space-separated list of submodules to init (leave empty to skip)
    required: false
    default: ''
  pico_sdk_submodules:
    description: Also run `git -C lib/pico-sdk submodule update --init` (needed for rp2040 builds)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Clone MicroPython ${{ inputs.mpy_tag }}
      shell: bash
      run: |
        git clone --depth=1 --branch "${{ inputs.mpy_tag }}" \
          https://github.com/micropython/micropython.git
        cd micropython
        if [ -n "${{ inputs.submodules }}" ]; then
          git submodule update --init ${{ inputs.submodules }}
        fi
        if [ "${{ inputs.pico_sdk_submodules }}" = "true" ]; then
          git -C lib/pico-sdk submodule update --init
        fi
        echo "MPY_DIR=$GITHUB_WORKSPACE/micropython" >> "$GITHUB_ENV"
